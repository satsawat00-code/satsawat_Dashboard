<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรายรับ-รายจ่าย จากสลิป</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-xl text-white">
                    <i data-lucide="receipt" class="w-5 h-5"></i>
                </div>
                <h1 class="text-lg font-bold text-slate-800">SlipTracker</h1>
            </div>
            <button id="toggleSettingsBtn" class="p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-colors relative">
                <i data-lucide="settings" id="settingsIcon" class="w-5 h-5"></i>
            </button>
        </div>

        <div id="settingsPanel" class="hidden border-t border-slate-100 bg-slate-50/50">
            <div class="max-w-3xl mx-auto px-4 py-4 space-y-4">
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-4">
                    <h2 class="text-sm font-bold flex items-center gap-2 text-slate-700">
                        <i data-lucide="database" class="w-4 h-4 text-indigo-500"></i> ตั้งค่าการเชื่อมต่อ
                    </h2>
                    
                    <div>
                        <label class="text-xs font-semibold text-slate-500 mb-2 flex items-center gap-1">
                            <i data-lucide="link" class="w-3.5 h-3.5"></i> Google Apps Script URL (สำหรับบันทึกลงชีต)
                        </label>
                        <input type="text" id="sheetUrlInput" placeholder="https://script.google.com/macros/s/.../exec" class="w-full border-slate-200 rounded-lg p-2.5 text-sm bg-white border outline-none focus:border-indigo-500" />
                    </div>

                    <div>
                        <label class="text-xs font-semibold text-slate-500 mb-2 flex items-center gap-1">
                            <i data-lucide="key" class="w-3.5 h-3.5"></i> Gemini API Key (สำหรับอ่านสลิป)
                        </label>
                        <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="w-full border-slate-200 rounded-lg p-2.5 text-sm bg-white border outline-none focus:border-indigo-500" />
                        <div class="flex justify-between items-center mt-2">
                            <p class="text-xs text-slate-400">จำเป็นต้องใส่เพื่อวิเคราะห์รูปภาพ (<a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-indigo-500 hover:underline">รับ API ฟรี</a>)</p>
                            <button id="testApiBtn" class="text-xs bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-3 py-1.5 rounded-lg font-medium transition-colors">ทดสอบ Key</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto w-full px-4 py-6 flex-1 flex flex-col gap-6 pb-24">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gradient-to-br from-indigo-500 to-indigo-600 rounded-2xl p-5 text-white shadow-md shadow-indigo-200 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 opacity-10"><i data-lucide="wallet" class="w-24 h-24"></i></div>
                <p class="text-indigo-100 text-sm font-medium mb-1 relative z-10">รายจ่ายทั้งหมด</p>
                <h2 class="text-2xl font-bold relative z-10">฿<span id="balanceAmount">0.00</span></h2>
            </div>
            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm relative overflow-hidden flex flex-col justify-center items-center text-center cursor-pointer hover:border-indigo-300 transition-colors" onclick="document.getElementById('fileInput').click()">
                <div class="bg-indigo-50 text-indigo-600 p-3 rounded-full mb-2">
                    <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                </div>
                <p class="text-sm font-semibold text-slate-700">อัปโหลดสลิป</p>
                <p class="text-xs text-slate-400 mt-1">แตะเพื่อเลือกรูปภาพ</p>
                <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
            </div>
        </div>

        <div id="uploadStatus" class="hidden glass-panel rounded-xl p-4 shadow-sm border border-indigo-100">
            <div class="flex items-center gap-3">
                <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600"></div>
                <div class="flex-1">
                    <p class="text-sm font-medium text-slate-800" id="statusText">กำลังวิเคราะห์สลิป...</p>
                    <div class="w-full bg-slate-100 rounded-full h-1.5 mt-2">
                        <div id="progressBar" class="bg-indigo-600 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="w-4 h-4 text-indigo-500"></i> สรุปข้อมูล
                </h3>
                <select id="chartPeriodSelect" class="text-xs border-slate-200 rounded-lg p-1.5 bg-slate-50 border outline-none focus:border-indigo-500 text-slate-600">
                    <option value="daily">รายวัน</option>
                    <option value="monthly">รายเดือน</option>
                    <option value="yearly">รายปี</option>
                </select>
            </div>
            <div class="w-full h-48 relative">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-slate-800">รายการล่าสุด</h3>
                <span class="text-xs font-medium bg-slate-200 text-slate-600 px-2 py-1 rounded-md" id="txCount">0 รายการ</span>
            </div>
            <div id="transactionsList" class="space-y-3">
                </div>
        </div>
    </main>

    <script>
        // -----------------------
        // Initialization
        // -----------------------
        lucide.createIcons();

        // -----------------------
        // State & DOM Elements
        // -----------------------
        let transactions = JSON.parse(localStorage.getItem('slipTracker_txs')) || [];
        let storedApiKey = localStorage.getItem('slipTracker_apiKey') || '';
        let storedSheetUrl = localStorage.getItem('slipTracker_sheetUrl') || '';
        let expenseChartInstance = null; // ตัวแปรเก็บกราฟ

        const settingsPanel = document.getElementById('settingsPanel');
        const sheetUrlInput = document.getElementById('sheetUrlInput');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const fileInput = document.getElementById('fileInput');
        const chartPeriodSelect = document.getElementById('chartPeriodSelect');
        
        // Initialize inputs
        sheetUrlInput.value = storedSheetUrl;
        apiKeyInput.value = storedApiKey;
        updateUI();

        // -----------------------
        // Event Listeners
        // -----------------------
        document.getElementById('toggleSettingsBtn').addEventListener('click', () => {
            settingsPanel.classList.toggle('hidden');
        });

        sheetUrlInput.addEventListener('input', (e) => {
            storedSheetUrl = e.target.value.trim();
            localStorage.setItem('slipTracker_sheetUrl', storedSheetUrl);
        });

        apiKeyInput.addEventListener('input', (e) => {
            storedApiKey = e.target.value.trim();
            localStorage.setItem('slipTracker_apiKey', storedApiKey);
        });

        chartPeriodSelect.addEventListener('change', renderChart);

        document.getElementById('testApiBtn').addEventListener('click', async () => {
            const testKey = apiKeyInput.value.trim() || storedApiKey;
            const btn = document.getElementById('testApiBtn');
            
            if (!testKey) {
                alert('กรุณาวาง API Key ในช่องก่อนกดทดสอบครับ');
                return;
            }
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-3 h-3 animate-spin inline"></i> ทดสอบ...';
            lucide.createIcons();
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${testKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: "Hello" }] }]
                    })
                });
                
                const result = await response.json();
                if (result.error) throw new Error(result.error.message);
                
                alert('✅ สำเร็จ! API Key ของคุณพร้อมใช้งานแล้วครับ (เชื่อมต่อ Gemini 2.5 Flash ได้ปกติ)');
            } catch (err) {
                alert('❌ มีปัญหาการเชื่อมต่อ:\n' + err.message);
            } finally {
                btn.textContent = 'ทดสอบ Key';
            }
        });

        fileInput.addEventListener('change', handleFiles);

        // -----------------------
        // Core Logic
        // -----------------------
        async function handleFiles(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            
            if (!storedApiKey) {
                alert('กรุณาตั้งค่า Gemini API Key ในเมนูตั้งค่าก่อนอัปโหลดสลิปครับ');
                settingsPanel.classList.remove('hidden');
                return;
            }

            const uploadStatus = document.getElementById('uploadStatus');
            const statusText = document.getElementById('statusText');
            const progressBar = document.getElementById('progressBar');
            
            uploadStatus.classList.remove('hidden');
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusText.textContent = `กำลังอ่านสลิปที่ ${i + 1} จาก ${files.length}...`;
                progressBar.style.width = `${((i) / files.length) * 100}%`;
                
                try {
                    const base64Data = await fileToBase64(file);
                    const slipData = await extractDataFromSlip(base64Data, file.type);
                    
                    if (slipData) {
                        // ซ้อนชั้นเช็คความปลอดภัย: หาก AI ตอบกลับมาเป็นปี พ.ศ. (เกิน 2500) ให้แปลงเป็น ค.ศ. อัตโนมัติ
                        if (slipData.date) {
                            let dParts = slipData.date.split('/');
                            if (dParts.length === 3 && parseInt(dParts[2]) > 2500) {
                                dParts[2] = (parseInt(dParts[2]) - 543).toString();
                                slipData.date = dParts.join('/');
                            }
                        }

                        const newTx = {
                            id: Date.now().toString() + i,
                            ...slipData,
                            timestamp: new Date().toISOString()
                        };
                        
                        // Save local
                        transactions.unshift(newTx);
                        localStorage.setItem('slipTracker_txs', JSON.stringify(transactions));
                        updateUI();
                        
                        // Sync to Sheets
                        if (storedSheetUrl) {
                            statusText.textContent = `กำลังบันทึกลง Google Sheets...`;
                            await saveToGoogleSheets(newTx);
                        }
                    }
                } catch (err) {
                    console.error("Error processing file:", err);
                    alert(`ภาพที่ ${i+1} อ่านไม่สำเร็จ: ${err.message}`);
                }
            }
            
            progressBar.style.width = `100%`;
            setTimeout(() => {
                uploadStatus.classList.add('hidden');
                progressBar.style.width = `0%`;
                fileInput.value = ''; // Reset input
            }, 1000);
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function extractDataFromSlip(base64String, mimeType) {
            const base64Content = base64String.split(',')[1];
            
            const promptText = `
                วิเคราะห์รูปสลิปโอนเงินนี้ และดึงข้อมูลออกมาเป็น JSON format เท่านั้น โดยไม่ต้องมีเครื่องหมาย \`\`\`json ครอบ
                ข้อมูลที่ต้องการ:
                {
                    "date": "วันที่โอนเงิน (รูปแบบ DD/MM/YYYY โดยแปลงปี พ.ศ. ให้เป็นปี ค.ศ. เสมอ เช่น ถ้าเป็นปี 2567 ให้แปลงเป็น 2024)",
                    "time": "เวลาที่โอนเงิน (รูปแบบ HH:MM)",
                    "amount": ตัวเลขจำนวนเงิน (ไม่ต้องมีลูกน้ำ),
                    "receiver": "ชื่อผู้รับเงิน หรือ ชื่อร้านค้า",
                    "bank": "ธนาคารปลายทาง"
                }
            `;

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${storedApiKey}`;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inlineData: { mimeType: mimeType, data: base64Content } }
                    ]
                }],
                generationConfig: {
                    temperature: 0.1,
                    responseMimeType: "application/json"
                }
            };

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            
            if (result.error) {
                throw new Error(result.error.message);
            }

            try {
                const jsonText = result.candidates[0].content.parts[0].text;
                return JSON.parse(jsonText);
            } catch (e) {
                throw new Error("AI ตอบกลับมาผิดรูปแบบ ไม่สามารถอ่านข้อมูลได้");
            }
        }

        async function saveToGoogleSheets(data) {
            try {
                await fetch(storedSheetUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: data.date,
                        time: data.time,
                        amount: data.amount,
                        receiver: data.receiver,
                        bank: data.bank
                    })
                });
            } catch (error) {
                console.error("Sheet sync error:", error);
            }
        }

        window.deleteTx = function(id) {
            if(confirm('ต้องการลบรายการนี้ใช่หรือไม่?')) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('slipTracker_txs', JSON.stringify(transactions));
                updateUI();
            }
        }

        // -----------------------
        // Chart Logic (NEW)
        // -----------------------
        function renderChart() {
            const period = chartPeriodSelect.value;
            const ctx = document.getElementById('expenseChart').getContext('2d');
            
            // รวบรวมข้อมูลตามที่เลือก (วัน, เดือน, ปี)
            const aggregatedData = {};
            
            transactions.forEach(tx => {
                const amt = Number(tx.amount) || 0;
                if (!tx.date) return;
                
                let key = tx.date; // ค่าเริ่มต้น (รายวัน)
                const parts = tx.date.split('/'); // แยก DD, MM, YYYY
                
                if (parts.length === 3) {
                    if (period === 'monthly') {
                        key = `${parts[1]}/${parts[2]}`; // MM/YYYY
                    } else if (period === 'yearly') {
                        key = `${parts[2]}`; // YYYY
                    }
                }
                
                aggregatedData[key] = (aggregatedData[key] || 0) + amt;
            });

            // เรียงลำดับวันที่จากอดีตไปปัจจุบัน
            const sortedKeys = Object.keys(aggregatedData).sort((a, b) => {
                let dateA, dateB;
                if (period === 'daily') {
                    let [d, m, y] = a.split('/');
                    dateA = new Date(y, m - 1, d);
                    let [d2, m2, y2] = b.split('/');
                    dateB = new Date(y2, m2 - 1, d2);
                } else if (period === 'monthly') {
                    let [m, y] = a.split('/');
                    dateA = new Date(y, m - 1, 1);
                    let [m2, y2] = b.split('/');
                    dateB = new Date(y2, m2 - 1, 1);
                } else {
                    dateA = new Date(a, 0, 1);
                    dateB = new Date(b, 0, 1);
                }
                return dateA - dateB;
            });

            const labels = sortedKeys;
            const dataValues = sortedKeys.map(k => aggregatedData[k]);

            // ลบกราฟเก่าออกก่อนวาดใหม่ (ป้องกันบัค)
            if (expenseChartInstance) {
                expenseChartInstance.destroy();
            }

            expenseChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'ยอดรวม (฿)',
                        data: dataValues,
                        backgroundColor: 'rgba(79, 70, 229, 0.8)',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { font: { family: "'Prompt', sans-serif", size: 10 } } },
                        x: { ticks: { font: { family: "'Prompt', sans-serif", size: 10 } } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // -----------------------
        // UI Rendering
        // -----------------------
        function updateUI() {
            // Update Balance
            const total = transactions.reduce((sum, tx) => sum + (Number(tx.amount) || 0), 0);
            document.getElementById('balanceAmount').textContent = total.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('txCount').textContent = `${transactions.length} รายการ`;

            // Render Chart
            renderChart();

            // Render List
            const list = document.getElementById('transactionsList');
            if (transactions.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-10 bg-white border border-slate-200 rounded-2xl border-dashed">
                        <div class="text-slate-300 mb-2 flex justify-center"><i data-lucide="receipt" class="w-10 h-10"></i></div>
                        <p class="text-slate-500 font-medium">ยังไม่มีรายการ</p>
                        <p class="text-xs text-slate-400 mt-1">อัปโหลดสลิปเพื่อเริ่มบันทึก</p>
                    </div>`;
            } else {
                list.innerHTML = transactions.map(tx => `
                    <div class="bg-white border border-slate-100 p-4 rounded-xl shadow-sm flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <div class="bg-red-50 text-red-500 p-2.5 rounded-full">
                                <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold text-slate-800 text-sm line-clamp-1">${tx.receiver || 'ไม่ระบุชื่อ'}</h4>
                                <div class="flex items-center gap-2 text-xs text-slate-500 mt-0.5">
                                    <span>${tx.date} ${tx.time}</span>
                                    ${tx.bank ? `<span class="bg-slate-100 px-1.5 py-0.5 rounded text-[10px]">${tx.bank}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 text-right">
                            <span class="font-bold text-slate-800">฿${Number(tx.amount).toLocaleString('th-TH', {minimumFractionDigits: 2})}</span>
                            <button onclick="deleteTx('${tx.id}')" class="text-slate-300 hover:text-red-500 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
